<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Icons -->
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.svg" />

		<!-- SEO (page <title> is set in +layout.svelte) -->
		<meta
			name="description"
			content="Group movie-night recommendations from everyone's Letterboxd taste."
		/>
		<meta name="theme-color" content="#0a0c10" />

		<!-- Open Graph -->
		<meta property="og:title" content="movienight" />
		<meta
			property="og:description"
			content="Group movie-night recommendations from everyone's Letterboxd taste."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://movienight.alex-wf.com/" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="movienight" />
		<meta
			name="twitter:description"
			content="Group movie-night recommendations from everyone's Letterboxd taste."
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

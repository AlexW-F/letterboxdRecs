server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: client-side router owns all paths.
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    # API proxy. The backend container is named "api" in docker-compose.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Letterboxd exports can be ~100KB-1MB; bump the body limit.
        client_max_body_size 32m;
        # Streaming-friendly timeouts (recompute can take seconds for big groups).
        proxy_read_timeout 120s;
    }
}
